<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWA Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="openSidebar" type="button" aria-label="Open menu">☰</button>
      <a href="index.html" class="brand" aria-label="SWA Assistant home">SWA Assistant</a>
    </div>
  </header>

  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <aside class="sidebar" id="sidebar" aria-label="Sidebar navigation">
    <button class="close-btn" id="closeSidebar" type="button" aria-label="Close menu">×</button>

    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link active">Home</a>
      <a href="writing.html" class="sidebar-link">Writing</a>
      <a href="speaking.html" class="sidebar-link">Speaking</a>
      <a href="pricing.html" class="sidebar-link">Pricing</a>
      <a href="#" class="sidebar-link">Progress</a>
      <a href="#" class="sidebar-link">About</a>
      <a href="#" class="sidebar-link">Contact</a>
    </nav>
  </aside>

  <main class="container">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-badge">
        <img src="./images/logo.png" alt="SWA Assistant Logo" class="hero-logo">
      </div>

      <p class="hero-tag">AI-powered IELTS preparation</p>

      <h1 id="hero-title">Practice IELTS with AI</h1>

      <p class="hero-text">
        Improve your Writing and Speaking with instant AI feedback, band score suggestions,
        grammar corrections, and personalized recommendations.
      </p>

      <div class="hero-actions">
        <a href="writing.html" class="btn">Start Writing</a>
        <a href="speaking.html" class="btn btn-secondary">Start Speaking</a>
      </div>
    </section>
  </main>

  <script>
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const openSidebar = document.getElementById("openSidebar");
    const closeSidebar = document.getElementById("closeSidebar");

    function openMenu() {
      sidebar.classList.add("active");
      overlay.classList.add("active");
      overlay.setAttribute("aria-hidden", "false");
    }

    function closeMenu() {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
      overlay.setAttribute("aria-hidden", "true");
    }

    openSidebar.addEventListener("click", openMenu);
    closeSidebar.addEventListener("click", closeMenu);
    overlay.addEventListener("click", closeMenu);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeMenu();
    });
  </script>

</body>
</html>
